services:
  redis-master:
    image: bitnami/redis:latest
    environment:
      REDIS_REPLICATION_MODE: master
      ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping || exit 1" ]
    restart: unless-stopped

  redis-replica:
    image: bitnami/redis:latest
    environment:
      REDIS_REPLICATION_MODE: slave
      REDIS_MASTER_HOST: redis-master
      ALLOW_EMPTY_PASSWORD: "yes"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping || exit 1" ]
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel:
    image: bitnami/redis-sentinel:latest
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_SENTINEL_QUORUM: 1
    ports:
      - "26379:26379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -p 26379 ping || exit 1" ]
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped
 
  mock_backend:
    build: 
      context: .
      dockerfile: Dockerfile.mock_backend
    # ports:
    #   - "9091:9091"
    depends_on:
      redis-sentinel:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build: 
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      # Inject Docker DNS names instead of localhost
      - BACKEND_ADDR=mock_backend:9091
      - REDIS_SENTINEL_ADDR=redis-sentinel:26379
    depends_on:
      mock_backend:
        condition: service_started
      redis-sentinel:
        condition: service_healthy
    restart: unless-stopped