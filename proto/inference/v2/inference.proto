syntax = "proto3";

package inference.v2;

// The go_package is required for the protoc Go compiler
option go_package = "github.com/powoftech/ai-inference-gateway/proto/inference/v2;inferencev2";

// InferenceService is the streaming RPC for modern LLM interaction
service InferenceService {
    rpc InferStream(InferRequest) returns (stream InferChunk);
    rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message InferRequest {
    string request_id = 1;
    string model_id = 2;
    string prompt = 3;
    map<string, string> metadata = 4;
}

message InferChunk {
    string request_id = 1;
    string text = 2;            // The generated token(s)
    bool is_final = 3;          // True on generation end
    int64 generated_tokens = 4; // Included in final chunk
}

message HealthRequest {}

message HealthResponse {
    string status = 1;
}